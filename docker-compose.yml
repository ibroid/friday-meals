services:
  mariadb:
    image: mariadb:10.11
    container_name: fridaymeals_mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: fridaymeals
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fridaymeals_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:root@mariadb:3306/fridaymeals
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-supersecretkey123}
    depends_on:
      - mariadb
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  mariadb_data:
  uploads_data:
